name: agent-lottery

services:
  backend:
    build:
      context: ./backend
    env_file:
      - ${BACKEND_ENV_FILE:-./.env.docker}
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${PUBLIC_ORIGIN:-http://localhost:8080}
      BACKUP_DIR: /app/backups
    expose:
      - "5000"
    volumes:
      - backend_backups:/app/backups
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    environment:
      APP_SITE_ADDRESS: ${APP_SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  backend_backups:
  caddy_data:
  caddy_config:
